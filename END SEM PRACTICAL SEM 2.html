<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, rgb(244, 109, 109), rgb(125, 125, 226));
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: linear-gradient(45deg, rgb(117, 117, 240), rgb(235, 110, 110));
            padding: 20px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .2);
            text-align: center;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            text-align: left;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Student Result Calculator</h2>

        <button onclick="calculate()">Calculate Result</button>

        <div id="result"></div>
    </div>

    <script>
        function calculate() {

            let n = parseInt(prompt("Enter Number of Subjects:"));

            if (isNaN(n) || n <= 0) {
                alert("Invalid Input");
                return;
            }

            let total = 0, fail = false;

            for (let i = 1; i <= n; i++) {

                let marks = parseFloat(prompt("Enter Marks of Subject " + i));

                if (isNaN(marks) || marks < 0 || marks > 100) {
                    alert("Invalid Marks");
                    return;
                }

                total += marks;

                if (marks < 33)
                    fail = true;
            }

            let avg = total / n;
            let grade;

            if (avg >= 90)
                grade = "A+";
            else if (avg >= 80)
                grade = "A";
            else if (avg >= 70)
                grade = "B";
            else if (avg >= 60)
                grade = "C";
            else if (avg >= 50)
                grade = "D";
            else
                grade = "F";

            let result = fail ? "Fail" : "Pass";

            document.getElementById("result").innerHTML =
                `
    <h3>Result</h3>
    Total Marks : ${total}<br>
    Average Marks : ${avg.toFixed(2)}<br>
    Grade : ${grade}<br>
    Result : ${result}
    `;
        }
    </script>

</body>

</html>
