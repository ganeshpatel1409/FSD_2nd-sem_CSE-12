<!-- Problem Statement:
Store and process student marks using variables, arrays, objects, loops, and conditional statements in JavaScript.
Create a web-based system where:
User enters:

Student Name

Roll Number

Marks in Math

Marks in Science

Marks in English

Each student record should be stored as an object inside an array.
Provide buttons to:

Display all students

Calculate total marks for each student

Calculate average marks

Display students who scored above 80 average marks

Display students who failed (average < 40)

Count total number of students

Display all results dynamically on the webpage.

Objective

Develop a web application using HTML, CSS, and JavaScript that:

Stores student data using objects inside an array

Uses variables to store input values

Uses loops to process student records

Uses conditional statements to classify pass/fail

Calculates total and average marks

Displays filtered student data on the webpage

Covers Syllabus

Variables

Arrays

Objects

Loops (for, for...of)

Conditional Statements (if, else)

Basic array processing

Expected Outcome

Student records are stored correctly.

Total and average marks are calculated.

Students with high marks and failed students are filtered correctly.

All results are displayed dynamically on the webpage.

Tools Required

HTML

CSS

JavaScript -->


<!DOCTYPE html>
<html>
<head>
    <title>Student Marks System</title>
    <link rel="stylesheet" href="assesment1.css">
</head>
<body>
<h1>Student Marks Management</h1>
<div class="box">
<div class="form">
    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="roll" placeholder="Roll Number">
    <input type="number" id="math" placeholder="Math Marks">
    <input type="number" id="science" placeholder="Science Marks">
    <input type="number" id="english" placeholder="English Marks">
    <br>
    <button onclick="addStudent()">Add Student</button>
</div>
<div class="buttons">
<button onclick="displayStudents()">Display All Students</button>
<button onclick="calculateTotal()">Calculate Total Marks</button>
<button onclick="calculateAverage()">Calculate Average</button>
<button onclick="showTopStudents()">Students Above 80 Average</button>
<button onclick="showFailedStudents()">Failed Students</button>
<button onclick="countStudents()">Total Students</button>
</div>
<div id="output"></div>
</div>
<script src="assesment1.js"></script>
</body>
</html>
