<!DOCTYPE html>
<html>
<head>
    <title>Data Entry List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 15px;
            margin-left: 5px;
            cursor: pointer;
        }

        ul {
            width: 300px;
            margin: 20px auto;
            text-align: left;
        }
    </style>
</head>
<body>
    <h2>Student Data Entry</h2>
    <input type="text" id="dataInput" placeholder="Enter data">
    <button onclick="addData()">Add</button>    <h3>Data List</h3>
    <ul id="dataList"></ul>
    <script>
        function addData() {
            let input = document.getElementById("dataInput");
            let value = input.value.trim();
            if (value === "") {
                alert("Please enter some data!");
                return;
            }
            let li = document.createElement("li");
            li.textContent = value;
            document.getElementById("dataList").appendChild(li);
           input.value = "";
            input.focus();
        }
    </script>
</body>
</html>
